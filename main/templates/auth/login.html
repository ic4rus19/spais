<!-- login.html -->

{% extends 'base.html' %}
<!-- *Cargamos los estilos que nos interesan -->
{% block head %}
    <!-- - Estilos de bootstrap head de login -->
    <link rel="stylesheet" href="{{ url_for('static', filename = 'css/login.css') }}">
{% endblock %}

<!-- *Indicamos el bloque vacio para base no carge nada -->
{% block header %}

{% endblock %}
{% block title %}Iniciar sessió{% endblock %}

{% block content %}
<!--- Login con sus estilo-->
<section class="login">
    <main class="form-signin w-100 m-auto text-center" style="max-width: 400px;">
        
        <img class="mb-3" src="../img/bp-dark.png" alt="" width="72">
        <h1 class="h3 mb-1 fw-bold">Iniciar sessió</h1>
        <form method="post">
            <div class="form-floating mb-2">
                <input type="email" class="form-control" id="email" name="email" required placeholder="name@example.com">
                <label for="email">Email</label>
            </div>

            <div class="form-floating mb-3">
                <input type="password" class="form-control" id="password" name="password" required placeholder="Password">
                <label for="password">Password</label>
            </div>

            <button class="w-100 btn btn-lg btn-primary" type="submit">
                Inicia sessió
            </button>
        </form>

        <hr class="my-3">

        <p class="text-muted text-center mb-0">
            Si NO tens usuari, torna a 
            <a href="{{ url_for('home.index') }}" class="fw-bold text-decoration-none">INICI</a>
        </p>

    </main>
</section>


{% endblock %}
